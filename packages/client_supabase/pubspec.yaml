name: client_supabase
description: Supabase REST client (Dio), DI, and optional GoTrue-aware Dio interceptor for RLS.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  dio: ^5.3.3
  get_it: ^8.3.0
  supabase_flutter: ^2.12.2
  injectable: ^2.5.0
  json_annotation: ^4.11.0
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  lints: ^6.0.0
  test: ^1.25.6
